name: Update Commit Card

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1" # Mondays 05:00 UTC

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v4

      - name: Gather commit data across all branches
        shell: bash
        run: |
          set -euo pipefail

          OWNERS=(
            KyleGortych
            NexisOS
            KyleGortych-Kenzie-Academy-Group-Work
            KyleGortych-SNHU
            KyleGortych-eCornell
          )

          RESULTS="$RUNNER_TEMP/results"
          CLONES="$RUNNER_TEMP/clones"
          mkdir -p "$RESULTS" "$CLONES"
          export RESULTS CLONES

          # ---- 1. list repos (sequential; API is fast) ----
          REPO_LIST="$RUNNER_TEMP/repos.list"
          : > "$REPO_LIST"
          for OWNER in "${OWNERS[@]}"; do
            gh repo list "$OWNER" --limit 1000 \
              --json name,isFork \
              --jq ".[] | select(.isFork | not) | \"$OWNER/\" + .name" \
              >> "$REPO_LIST"
          done
          echo "$(wc -l < "$REPO_LIST") repos to process"

          # ---- 2. worker: one repo, writes only its own files ----
          # (parallel workers must never share output files; interleaved
          # appends from concurrent git log streams would corrupt data)
          cat > "$RUNNER_TEMP/worker.sh" <<'WORKER'
          #!/usr/bin/env bash
          FULL="$1"
          SAFE="${FULL//\//__}"
          DIR="$CLONES/$SAFE.git"
          OUT="$RESULTS/$SAFE"
          AUTHOR_ARGS=(
            --author=kyle.gortych@gmail.com
            --author=99693659+kylegortych@users.noreply.github.com
          )
          rm -rf "$DIR"
          # blob:none keeps trees (file paths) but not contents,
          # which is what --name-only needs for language stats
          if ! git clone --quiet --bare --filter=blob:none \
               "https://github.com/$FULL.git" "$DIR" 2>/dev/null; then
            rm -rf "$DIR"
            echo "::warning::failed to clone $FULL, skipping"
            exit 0
          fi
          # guards: empty/branchless repos make rev-list/log exit non-zero
          N=$(git --git-dir="$DIR" rev-list --count --branches \
                --fixed-strings "${AUTHOR_ARGS[@]}" 2>/dev/null || echo 0)
          printf '%s\t%s\n' "$N" "$FULL" > "$OUT.tsv"
          git --git-dir="$DIR" log --branches --fixed-strings \
            "${AUTHOR_ARGS[@]}" --format=%as > "$OUT.dates" 2>/dev/null || true
          # no rename detection: it would lazily fetch the missing blobs
          git --git-dir="$DIR" -c diff.renames=false log --branches \
            --fixed-strings "${AUTHOR_ARGS[@]}" --name-only --format= \
            > "$OUT.files" 2>/dev/null || true
          rm -rf "$DIR"
          echo "$FULL: $N"
          exit 0
          WORKER
          chmod +x "$RUNNER_TEMP/worker.sh"

          # ---- 3. run workers in parallel (clone is network-bound) ----
          xargs -a "$REPO_LIST" -P 6 -n 1 "$RUNNER_TEMP/worker.sh"

          # ---- 4. aggregate (sequential, race-free) ----
          find "$RESULTS" -name '*.tsv'   -exec cat {} + > "$RUNNER_TEMP/repos.tsv"
          find "$RESULTS" -name '*.dates' -exec cat {} + > "$RUNNER_TEMP/dates.txt"
          find "$RESULTS" -name '*.files' -exec cat {} + > "$RUNNER_TEMP/files.txt"
          echo "total: $(awk -F'\t' '{s+=$1} END {print s}' "$RUNNER_TEMP/repos.tsv") commits"

      - name: Render SVG card
        run: |
          python3 <<'PY'
          import os, html
          from collections import Counter
          from datetime import date

          tmp = os.environ["RUNNER_TEMP"]

          repos = []  # (count, "owner/repo")
          with open(f"{tmp}/repos.tsv", encoding="utf-8") as f:
              for line in f:
                  n, name = line.rstrip("\n").split("\t")
                  repos.append((int(n), name))
          repos.sort(reverse=True)

          dates = [d.strip() for d in open(f"{tmp}/dates.txt", encoding="utf-8") if d.strip()]
          total = sum(n for n, _ in repos)
          active_repos = sum(1 for n, _ in repos if n > 0)
          first_year = min(dates)[:4] if dates else "-"

          # ---- languages: by extension of files touched in my commits ----
          EXT_LANG = {
              "rs": "Rust", "nix": "Nix", "py": "Python", "java": "Java",
              "js": "JavaScript", "jsx": "JavaScript", "mjs": "JavaScript",
              "ts": "TypeScript", "tsx": "TypeScript",
              "html": "HTML", "htm": "HTML", "hbs": "HTML",
              "css": "CSS", "scss": "CSS",
              "go": "Go", "php": "PHP", "sql": "SQL",
              "sh": "Shell", "bash": "Shell", "fish": "Shell",
              "ps1": "PowerShell", "el": "Emacs Lisp",
              "c": "C", "h": "C", "cpp": "C++", "hpp": "C++",
              "lua": "Lua", "vim": "Vim Script",
          }
          langs = Counter()
          with open(f"{tmp}/files.txt", encoding="utf-8", errors="replace") as f:
              for line in f:
                  path = line.strip()
                  if not path or "." not in path.rsplit("/", 1)[-1]:
                      continue
                  ext = path.rsplit(".", 1)[-1].lower()
                  if ext in EXT_LANG:
                      langs[EXT_LANG[ext]] += 1
          top_langs = langs.most_common(5)
          lang_total = sum(langs.values()) or 1

          # last 12 calendar months, oldest -> newest
          today = date.today()
          months = []
          y, m = today.year, today.month
          for _ in range(12):
              months.append(f"{y:04d}-{m:02d}")
              m -= 1
              if m == 0:
                  y, m = y - 1, 12
          months.reverse()
          per_month = Counter(d[:7] for d in dates)
          counts = [per_month.get(mo, 0) for mo in months]
          peak = max(counts) or 1

          # ---- molokai theme: dark grey / white / blue ----
          BG, BORDER = "#1B1D1E", "#3E3D32"
          TITLE, TEXT, MUTED, BAR = "#66D9EF", "#F8F8F2", "#7E8E91", "#66D9EF"
          LANG_COLORS = ["#66D9EF", "#A6E22E", "#F92672", "#FD971F", "#AE81FF"]
          W, H = 495, 320
          FONT = "font-family=\"'Segoe UI',Ubuntu,Sans-Serif\""

          def short(full, limit=28):
              name = full.split("/", 1)[1]
              return name if len(name) <= limit else name[: limit - 1] + "\u2026"

          top3 = "".join(
              f'<text x="25" y="{118 + i * 22}" {FONT} font-size="12" '
              f'fill="{TEXT}">{html.escape(short(name))}'
              f'<tspan fill="{MUTED}"> \u00b7 {n}</tspan></text>'
              for i, (n, name) in enumerate(repos[:3]) if n > 0
          )

          # histogram: 12 bars, right-hand block
          bx, bw, gap, bh, base = 300, 12, 3, 70, 190
          bars = ""
          for i, c in enumerate(counts):
              h = max(2, round(bh * c / peak))
              x = bx + i * (bw + gap)
              bars += (f'<rect x="{x}" y="{base - h}" width="{bw}" height="{h}" '
                       f'rx="2" fill="{BAR}" fill-opacity="{0.35 + 0.65 * c / peak:.2f}"/>')
          bars += (f'<text x="{bx}" y="{base + 16}" {FONT} font-size="10" '
                   f'fill="{MUTED}">{months[0][2:].replace("-", "/")}</text>'
                   f'<text x="{bx + 11 * (bw + gap) + bw}" y="{base + 16}" {FONT} '
                   f'font-size="10" fill="{MUTED}" text-anchor="end">'
                   f'{months[-1][2:].replace("-", "/")}</text>')

          # ---- language section: stacked bar + legend ----
          lx, lw, ly, lh = 25, W - 50, 246, 8
          lang_svg = (f'<text x="{lx}" y="{ly - 8}" {FONT} font-size="11" '
                      f'fill="{MUTED}">languages \u00b7 by files touched</text>'
                      f'<clipPath id="langbar"><rect x="{lx}" y="{ly}" '
                      f'width="{lw}" height="{lh}" rx="4"/></clipPath>'
                      f'<rect x="{lx}" y="{ly}" width="{lw}" height="{lh}" '
                      f'rx="4" fill="{BORDER}"/><g clip-path="url(#langbar)">')
          cx = float(lx)
          for i, (lang, n) in enumerate(top_langs):
              seg = lw * n / lang_total
              lang_svg += (f'<rect x="{cx:.1f}" y="{ly}" width="{seg:.1f}" '
                           f'height="{lh}" fill="{LANG_COLORS[i]}"/>')
              cx += seg
          lang_svg += "</g>"
          for i, (lang, n) in enumerate(top_langs):
              ex = lx + i * 90
              ey = ly + 26
              pct = round(100 * n / lang_total)
              lang_svg += (f'<circle cx="{ex + 4}" cy="{ey - 4}" r="4" '
                           f'fill="{LANG_COLORS[i]}"/>'
                           f'<text x="{ex + 13}" y="{ey}" {FONT} font-size="10" '
                           f'fill="{TEXT}">{html.escape(lang)} '
                           f'<tspan fill="{MUTED}">{pct}%</tspan></text>')

          svg = (
              f'<svg width="{W}" height="{H}" viewBox="0 0 {W} {H}" '
              f'xmlns="http://www.w3.org/2000/svg" role="img" '
              f'aria-label="Commit activity across all branches and organizations">'
              f'<rect x="0.5" y="0.5" width="{W - 1}" height="{H - 1}" rx="4.5" '
              f'fill="{BG}" stroke="{BORDER}"/>'
              f'<text x="25" y="35" {FONT} font-size="18" font-weight="600" '
              f'fill="{TITLE}">Commit Activity \u2014 All Branches &amp; Orgs</text>'
              f'<text x="25" y="78" {FONT} font-size="32" font-weight="700" '
              f'fill="{TEXT}">{total:,}</text>'
              f'<text x="25" y="94" {FONT} font-size="11" fill="{MUTED}">'
              f'total commits \u00b7 {active_repos} repos \u00b7 since {first_year}</text>'
              f'{top3}'
              f'<text x="{bx}" y="{base - bh - 14}" {FONT} font-size="11" '
              f'fill="{MUTED}">last 12 months</text>'
              f'{bars}'
              f'{lang_svg}'
              f'<text x="25" y="{H - 14}" {FONT} font-size="9" fill="{MUTED}">'
              f'counted from git history \u00b7 updated weekly</text>'
              f'</svg>'
          )

          os.makedirs("assets", exist_ok=True)
          with open("assets/commit-card.svg", "w", encoding="utf-8") as f:
              f.write(svg)
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/commit-card.svg
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: update commit card"
          git push
