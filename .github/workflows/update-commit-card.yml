name: Update Commit Card

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1" # Mondays 05:00 UTC

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v4

      - name: Gather commit data across all branches
        shell: bash
        run: |
          set -euo pipefail

          OWNERS=(
            KyleGortych
            NexisOS
            KyleGortych-Kenzie-Academy-Group-Work
            KyleGortych-SNHU
            KyleGortych-eCornell
          )

          RESULTS="$RUNNER_TEMP/results"
          CLONES="$RUNNER_TEMP/clones"
          mkdir -p "$RESULTS" "$CLONES"
          export RESULTS CLONES

          # ---- 1. list repos (sequential; API is fast) ----
          REPO_LIST="$RUNNER_TEMP/repos.list"
          : > "$REPO_LIST"
          for OWNER in "${OWNERS[@]}"; do
            gh repo list "$OWNER" --limit 1000 \
              --json name,isFork \
              --jq ".[] | select(.isFork | not) | \"$OWNER/\" + .name" \
              >> "$REPO_LIST"
          done
          echo "$(wc -l < "$REPO_LIST") repos to process"

          # ---- 2. worker: one repo, writes only its own files ----
          # (parallel workers must never share output files; interleaved
          # appends from concurrent git log streams would corrupt data)
          cat > "$RUNNER_TEMP/worker.sh" <<'WORKER'
          #!/usr/bin/env bash
          FULL="$1"
          SAFE="${FULL//\//__}"
          DIR="$CLONES/$SAFE.git"
          OUT="$RESULTS/$SAFE"
          AUTHOR_ARGS=(
            --author=kyle.gortych@gmail.com
            --author=99693659+kylegortych@users.noreply.github.com
          )
          rm -rf "$DIR"
          # blob:none keeps trees (file paths) but not contents,
          # which is what --name-only needs for language stats
          if ! git clone --quiet --bare --filter=blob:none \
               "https://github.com/$FULL.git" "$DIR" 2>/dev/null; then
            rm -rf "$DIR"
            echo "::warning::failed to clone $FULL, skipping"
            exit 0
          fi
          # guards: empty/branchless repos make rev-list/log exit non-zero
          N=$(git --git-dir="$DIR" rev-list --count --branches \
                --fixed-strings "${AUTHOR_ARGS[@]}" 2>/dev/null || echo 0)
          printf '%s\t%s\n' "$N" "$FULL" > "$OUT.tsv"
          git --git-dir="$DIR" log --branches --fixed-strings \
            "${AUTHOR_ARGS[@]}" --format=%as > "$OUT.dates" 2>/dev/null || true
          # no rename detection: it would lazily fetch the missing blobs
          git --git-dir="$DIR" -c diff.renames=false log --branches \
            --fixed-strings "${AUTHOR_ARGS[@]}" --name-only --format= \
            > "$OUT.files" 2>/dev/null || true
          rm -rf "$DIR"
          echo "$FULL: $N"
          exit 0
          WORKER
          chmod +x "$RUNNER_TEMP/worker.sh"

          # ---- 3. run workers in parallel (clone is network-bound) ----
          xargs -a "$REPO_LIST" -P 6 -n 1 "$RUNNER_TEMP/worker.sh"

          echo "processed $(find "$RESULTS" -name '*.tsv' | wc -l) repos"

      - name: Render SVG card
        run: |
          python3 <<'PY'
          import os, html
          from collections import Counter, defaultdict
          from datetime import date

          tmp = os.environ["RUNNER_TEMP"]
          results = os.path.join(tmp, "results")

          # order here is the display fallback; rows sort by commits
          OWNER_LABELS = {
              "KyleGortych": "Personal",
              "NexisOS": "NexisOS",
              "KyleGortych-Kenzie-Academy-Group-Work": "Kenzie Academy",
              "KyleGortych-SNHU": "SNHU",
              "KyleGortych-eCornell": "eCornell",
          }

          EXT_LANG = {
              "rs": "Rust", "nix": "Nix", "py": "Python", "java": "Java",
              "js": "JavaScript", "jsx": "JavaScript", "mjs": "JavaScript",
              "ts": "TypeScript", "tsx": "TypeScript",
              "html": "HTML", "htm": "HTML", "hbs": "HTML",
              "css": "CSS", "scss": "CSS",
              "go": "Go", "php": "PHP", "sql": "SQL",
              "sh": "Shell", "bash": "Shell", "fish": "Shell",
              "ps1": "PowerShell", "el": "Emacs Lisp",
              "c": "C", "h": "C", "cpp": "C++", "hpp": "C++",
              "lua": "Lua", "vim": "Vim Script",
          }

          # ---- read per-repo results, attributing to owners ----
          repo_counts = []                     # (n, "owner/repo")
          owner_commits = Counter()
          owner_langs = defaultdict(Counter)   # owner -> Counter(lang)
          dates = []

          for fn in os.listdir(results):
              path = os.path.join(results, fn)
              safe, ext = fn.rsplit(".", 1)
              owner = safe.split("__", 1)[0]
              if ext == "tsv":
                  for line in open(path, encoding="utf-8"):
                      n, name = line.rstrip("\n").split("\t")
                      repo_counts.append((int(n), name))
                      owner_commits[owner] += int(n)
              elif ext == "dates":
                  dates += [d.strip() for d in open(path, encoding="utf-8") if d.strip()]
              elif ext == "files":
                  for line in open(path, encoding="utf-8", errors="replace"):
                      p = line.strip()
                      if not p or "." not in p.rsplit("/", 1)[-1]:
                          continue
                      e = p.rsplit(".", 1)[-1].lower()
                      if e in EXT_LANG:
                          owner_langs[owner][EXT_LANG[e]] += 1

          repo_counts.sort(reverse=True)
          total = sum(n for n, _ in repo_counts)
          active_repos = sum(1 for n, _ in repo_counts if n > 0)
          first_year = min(dates)[:4] if dates else "-"

          # last 12 calendar months, oldest -> newest
          today = date.today()
          months = []
          y, m = today.year, today.month
          for _ in range(12):
              months.append(f"{y:04d}-{m:02d}")
              m -= 1
              if m == 0:
                  y, m = y - 1, 12
          months.reverse()
          per_month = Counter(d[:7] for d in dates)
          counts = [per_month.get(mo, 0) for mo in months]
          peak = max(counts) or 1

          # ---- molokai theme: dark grey / white / blue ----
          BG, BORDER = "#1B1D1E", "#3E3D32"
          TITLE, TEXT, MUTED, BAR = "#66D9EF", "#F8F8F2", "#7E8E91", "#66D9EF"
          PALETTE = ["#66D9EF", "#A6E22E", "#F92672", "#FD971F", "#AE81FF", "#E6DB74"]
          OTHER_COLOR = "#5F5F5F"
          W, H = 495, 410
          FONT = "font-family=\"'Segoe UI',Ubuntu,Sans-Serif\""

          # one color per language, consistent across all owner rows
          global_langs = Counter()
          for c in owner_langs.values():
              global_langs.update(c)
          lang_order = [l for l, _ in global_langs.most_common(len(PALETTE))]
          color_of = {l: PALETTE[i] for i, l in enumerate(lang_order)}

          def short(full, limit=28):
              name = full.split("/", 1)[1]
              return name if len(name) <= limit else name[: limit - 1] + "\u2026"

          top3 = "".join(
              f'<text x="25" y="{118 + i * 22}" {FONT} font-size="12" '
              f'fill="{TEXT}">{html.escape(short(name))}'
              f'<tspan fill="{MUTED}"> \u00b7 {n}</tspan></text>'
              for i, (n, name) in enumerate(repo_counts[:3]) if n > 0
          )

          # histogram: 12 bars, right-hand block
          bx, bw, gap, bh, base = 300, 12, 3, 70, 190
          bars = ""
          for i, c in enumerate(counts):
              hgt = max(2, round(bh * c / peak))
              x = bx + i * (bw + gap)
              bars += (f'<rect x="{x}" y="{base - hgt}" width="{bw}" height="{hgt}" '
                       f'rx="2" fill="{BAR}" fill-opacity="{0.35 + 0.65 * c / peak:.2f}"/>')
          bars += (f'<text x="{bx}" y="{base + 16}" {FONT} font-size="10" '
                   f'fill="{MUTED}">{months[0][5:]}/{months[0][2:4]}</text>'
                   f'<text x="{bx + 11 * (bw + gap) + bw}" y="{base + 16}" {FONT} '
                   f'font-size="10" fill="{MUTED}" text-anchor="end">'
                   f'{months[-1][5:]}/{months[-1][2:4]}</text>')

          # ---- per-owner section: commits + language bar per row ----
          rows = sorted(OWNER_LABELS, key=lambda o: -owner_commits.get(o, 0))
          rx0, rbw = 205, 165     # language bar x and width
          owner_svg = (f'<text x="25" y="234" {FONT} font-size="11" '
                       f'fill="{MUTED}">by owner \u00b7 commits &amp; languages</text>')
          any_other = False
          for i, owner in enumerate(rows):
              yb = 256 + i * 24   # text baseline
              label = OWNER_LABELS[owner]
              n = owner_commits.get(owner, 0)
              lc = owner_langs.get(owner, Counter())
              o_total = sum(lc.values())
              owner_svg += (
                  f'<text x="25" y="{yb}" {FONT} font-size="11" '
                  f'fill="{TEXT}">{html.escape(label)}</text>'
                  f'<text x="195" y="{yb}" {FONT} font-size="11" '
                  f'fill="{MUTED}" text-anchor="end">{n}</text>'
                  f'<clipPath id="row{i}"><rect x="{rx0}" y="{yb - 9}" '
                  f'width="{rbw}" height="8" rx="4"/></clipPath>'
                  f'<rect x="{rx0}" y="{yb - 9}" width="{rbw}" height="8" '
                  f'rx="4" fill="{BORDER}"/>')
              if o_total:
                  segs = [(color_of[l], lc[l]) for l in lang_order if lc.get(l)]
                  other = o_total - sum(c for _, c in segs)
                  if other:
                      segs.append((OTHER_COLOR, other))
                      any_other = True
                  owner_svg += f'<g clip-path="url(#row{i})">'
                  cx = float(rx0)
                  for color, cnt in segs:
                      seg_w = rbw * cnt / o_total
                      owner_svg += (f'<rect x="{cx:.1f}" y="{yb - 9}" '
                                    f'width="{seg_w:.1f}" height="8" fill="{color}"/>')
                      cx += seg_w
                  owner_svg += "</g>"
                  top_lang, top_n = lc.most_common(1)[0]
                  owner_svg += (f'<text x="380" y="{yb}" {FONT} font-size="10" '
                                f'fill="{TEXT}">{html.escape(top_lang)} '
                                f'<tspan fill="{MUTED}">{round(100 * top_n / o_total)}%'
                                f'</tspan></text>')
              else:
                  owner_svg += (f'<text x="380" y="{yb}" {FONT} font-size="10" '
                                f'fill="{MUTED}">\u2014</text>')

          # shared legend: language -> color, decoded once for all rows
          entries = [(l, color_of[l]) for l in lang_order]
          if any_other:
              entries.append(("Other", OTHER_COLOR))
          ly = 382
          cx = 25.0
          for lang, color in entries:
              owner_svg += (f'<circle cx="{cx + 4:.1f}" cy="{ly - 4}" r="4" '
                            f'fill="{color}"/>'
                            f'<text x="{cx + 12:.1f}" y="{ly}" {FONT} '
                            f'font-size="10" fill="{MUTED}">{html.escape(lang)}</text>')
              cx += 12 + len(lang) * 5.6 + 14

          svg = (
              f'<svg width="{W}" height="{H}" viewBox="0 0 {W} {H}" '
              f'xmlns="http://www.w3.org/2000/svg" role="img" '
              f'aria-label="Commit activity across all branches and organizations">'
              f'<rect x="0.5" y="0.5" width="{W - 1}" height="{H - 1}" rx="4.5" '
              f'fill="{BG}" stroke="{BORDER}"/>'
              f'<text x="25" y="35" {FONT} font-size="18" font-weight="600" '
              f'fill="{TITLE}">Commit Activity for All Branches &amp; Orgs</text>'
              f'<text x="25" y="78" {FONT} font-size="32" font-weight="700" '
              f'fill="{TEXT}">{total:,}</text>'
              f'<text x="25" y="94" {FONT} font-size="11" fill="{MUTED}">'
              f'total commits \u00b7 {active_repos} repos \u00b7 since {first_year}</text>'
              f'{top3}'
              f'<text x="{bx}" y="{base - bh - 14}" {FONT} font-size="11" '
              f'fill="{MUTED}">last 12 months</text>'
              f'{bars}'
              f'{owner_svg}'
              f'<text x="25" y="{H - 12}" {FONT} font-size="9" fill="{MUTED}">'
              f'counted from git history \u00b7 updated weekly</text>'
              f'</svg>'
          )

          os.makedirs("assets", exist_ok=True)
          with open("assets/commit-card.svg", "w", encoding="utf-8") as f:
              f.write(svg)
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/commit-card.svg
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: update commit card"
          git push
